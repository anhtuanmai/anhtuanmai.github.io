<div class="post-stats post-stats--bottom" id="post-stats-bottom"
     data-api="{{ site.stats_api_url }}"
     data-section="blog"
     data-id="{{ page.slug }}">
  {% if jekyll.environment == 'development' %}
  <span class="post-stats__views" title="Views">
    <i class="fas fa-eye" aria-hidden="true"></i>
    <span data-stat="views">…</span>
  </span>
  {% endif %}
  <button type="button" class="post-stats__like" data-stat="like-btn" aria-label="Like this post">
    <i class="fas fa-heart" aria-hidden="true"></i>
    <span data-stat="likes">…</span>
  </button>
</div>

<style>
  .post-stats {
    display: flex;
    gap: 1.25em;
    align-items: center;
    font-size: 0.9em;
  }
  .post-stats--top {
    justify-content: flex-end;
    margin: 0 0 1em 0;
  }
  .post-stats--bottom {
    justify-content: flex-end;
    margin: 1.5em 0 0 0;
  }
  .post-stats i {
    margin-right: 0.35em;
  }
  .post-stats .post-stats__like {
    background: none;
    border: 1px solid currentColor;
    border-radius: 999px;
    padding: 0.25em 0.85em;
    cursor: pointer;
    font: inherit;
    color: inherit;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .post-stats .post-stats__like:hover:not(:disabled) {
    background: rgba(127, 127, 127, 0.12);
  }
  .post-stats .post-stats__like.liked {
    background: #ffe8ef;
    border-color: #e74c3c;
    color: #e74c3c;
  }
  .post-stats .post-stats__like.liked:hover:not(:disabled) {
    background: #ffd6e2;
  }
</style>

<script>
(function () {
  var bottom = document.getElementById('post-stats-bottom');
  if (!bottom) return;
  var api = bottom.dataset.api;
  var section = bottom.dataset.section;
  var id = bottom.dataset.id;
  if (!api) return;
  var base = api + '/hit/' + section + '/' + id;
  var baseGet = api + '/get/' + section + '/' + id;

  // Move the bottom widget to the end of `.page__content` so it sits as
  // its own right-aligned row right after the article body. The tags
  // footer keeps its native full-width position below.
  var pageContent = document.querySelector('.page__content');
  if (pageContent) pageContent.appendChild(bottom);

  // Clone for the top-right placement above the article content.
  var top = bottom.cloneNode(true);
  top.id = 'post-stats-top';
  top.classList.remove('post-stats--bottom');
  top.classList.add('post-stats--top');
  if (pageContent) pageContent.insertBefore(top, pageContent.firstChild);

  var widgets = [bottom, top];
  function eachStat(sel, fn) {
    widgets.forEach(function (w) {
      var el = w.querySelector(sel);
      if (el) fn(el);
    });
  }
  function setStat(sel, v) {
    eachStat(sel, function (el) { el.textContent = (v == null ? '–' : v); });
  }

  var likedFlag = 'liked:' + section + '/' + id;

  {% if jekyll.environment == 'development' %}
  // Increment view count once per page load (dev only — prod builds skip this).
  fetch(base + '/view')
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (d) { setStat('[data-stat="views"]', d && d.value); })
    .catch(function () { setStat('[data-stat="views"]', null); });
  {% endif %}

  // Read like count without incrementing.
  fetch(baseGet + '/like')
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (d) { setStat('[data-stat="likes"]', d && d.value != null ? d.value : 0); })
    .catch(function () { setStat('[data-stat="likes"]', null); });

  // Restore "already liked" state from this browser.
  if (localStorage.getItem(likedFlag)) {
    eachStat('[data-stat="like-btn"]', function (b) { b.classList.add('liked'); });
  }

  function onLike() {
    var liked = !!localStorage.getItem(likedFlag);
    var endpoint = (liked ? api + '/dec/' : api + '/hit/') + section + '/' + id + '/like';
    eachStat('[data-stat="like-btn"]', function (b) { b.disabled = true; });
    fetch(endpoint)
      .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function (d) {
        setStat('[data-stat="likes"]', d.value);
        if (liked) {
          eachStat('[data-stat="like-btn"]', function (b) { b.classList.remove('liked'); });
          localStorage.removeItem(likedFlag);
        } else {
          eachStat('[data-stat="like-btn"]', function (b) { b.classList.add('liked'); });
          localStorage.setItem(likedFlag, '1');
        }
      })
      .catch(function () {})
      .then(function () {
        eachStat('[data-stat="like-btn"]', function (b) { b.disabled = false; });
      });
  }

  eachStat('[data-stat="like-btn"]', function (b) { b.addEventListener('click', onLike); });
})();
</script>
