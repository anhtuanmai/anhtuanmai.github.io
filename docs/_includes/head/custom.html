<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
<link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}">

<!-- Round avatar -->
<style>
  .author__avatar img,
  .sidebar .author__avatar img {
    width: 110px;
    height: 110px;
    max-width: 110px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center;
  }

  /* Decrease base font size by ~2 steps */
  html { font-size: 12px; }
  @media (min-width: 48em)   { html { font-size: 14px; } }
  @media (min-width: 64em)   { html { font-size: 16px; } }
  @media (min-width: 80em)   { html { font-size: 18px; } }

  /* Hide Bluesky and Twitter share buttons */
  .page__share-btn--bluesky,
  .btn--twitter,
  a.btn[href*="bsky.app"],
  a.btn[href*="twitter.com/intent"],
  a.btn[href*="x.com/intent"] {
    display: none !important;
  }
</style>
