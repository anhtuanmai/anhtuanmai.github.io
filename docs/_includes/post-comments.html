<div class="post-comments" id="post-comments"
     data-api="{{ site.stats_api_url }}"
     data-section="blog"
     data-id="{{ page.slug }}">
  <h3 class="post-comments__title" data-comments-title>Comments</h3>
  <form class="post-comments__form is-collapsed" data-comments-form novalidate>
    <div class="post-comments__field post-comments__field--text">
      <textarea name="text" placeholder="Add a comment…" rows="1" maxlength="1000" required></textarea>
      <div class="post-comments__field-meta">
        <span class="post-comments__error" data-comments-error></span>
        <span class="post-comments__counter" data-comments-counter>0 / 1000</span>
      </div>
    </div>
    <div class="post-comments__expanded">
      <div class="post-comments__field">
        <input type="text" name="name" placeholder="Your name" maxlength="50" required>
      </div>
      <div class="post-comments__actions">
        <button type="button" class="post-comments__cancel" data-comments-cancel>Cancel</button>
        <button type="submit">Post comment</button>
      </div>
    </div>
  </form>
  <div class="post-comments__list" data-comments-list>
    <p class="post-comments__empty" data-comments-empty>Loading…</p>
  </div>
</div>

<style>
  .post-comments {
    margin: 2em 0 0 0;
    font-size: 0.95em;
  }
  .post-comments__title {
    margin: 0 0 1em 0;
    font-size: 1.15em;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.5em;
  }
  .post-comments__title i { color: #888; }
  .post-comments__title-count {
    color: #888;
    font-weight: 500;
    margin-left: 0.3em;
  }
  .post-comments__title.is-empty {
    color: #888;
    font-weight: 500;
  }

  .post-comments__list {
    display: flex;
    flex-direction: column;
    gap: 0.85em;
  }

  .post-comments__item {
    display: flex;
    gap: 0.85em;
    background: #f6f7f9;
    border-radius: 10px;
    padding: 0.85em 1em;
  }
  @media (prefers-color-scheme: dark) {
    .post-comments__item { background: rgba(255, 255, 255, 0.04); }
  }

  .post-comments__avatar {
    flex: 0 0 auto;
    width: 2.4em;
    height: 2.4em;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    font-size: 1em;
    text-transform: uppercase;
    user-select: none;
  }

  .post-comments__body { flex: 1 1 auto; min-width: 0; }

  .post-comments__meta {
    display: flex;
    gap: 0.5em;
    align-items: baseline;
    font-size: 0.85em;
    color: #777;
    margin-bottom: 0.25em;
    flex-wrap: wrap;
  }
  .post-comments__name {
    font-weight: 700;
    color: #2a7ae2;
    font-size: 1.1em;
  }
  .post-comments__sep { color: #bbb; }
  .post-comments__date { cursor: help; }
  .post-comments__text {
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.5;
  }

  .post-comments__owner {
    margin-left: auto;
    display: flex;
    gap: 0.25em;
  }
  .post-comments__owner button {
    background: none;
    border: none;
    padding: 0.15em 0.4em;
    font: inherit;
    font-size: 0.95em;
    line-height: 1;
    cursor: pointer;
    color: #999;
    transition: color 0.15s ease;
  }
  .post-comments__owner button:hover { color: inherit; }
  .post-comments__owner button:last-child:hover { color: #c0392b; }

  .post-comments__empty {
    text-align: center;
    color: #888;
    padding: 1.75em 1em;
    background: #f6f7f9;
    border-radius: 10px;
    margin: 0;
  }
  .post-comments__empty i {
    color: #bbb;
    margin-right: 0.5em;
  }
  @media (prefers-color-scheme: dark) {
    .post-comments__empty { background: rgba(255, 255, 255, 0.04); }
  }

  .post-comments__form {
    display: flex;
    flex-direction: column;
    gap: 0.65em;
    background: #f6f7f9;
    border-radius: 10px;
    padding: 1em 1.1em;
    margin-bottom: 1.5em;
  }
  @media (prefers-color-scheme: dark) {
    .post-comments__form { background: rgba(255, 255, 255, 0.04); }
  }
  .post-comments__field { display: flex; flex-direction: column; gap: 0.25em; }
  .post-comments__form input,
  .post-comments__form textarea {
    width: 100%;
    font: inherit;
    padding: 0.55em 0.75em;
    border: 1px solid rgba(127, 127, 127, 0.25);
    border-radius: 6px;
    background: #fff;
    color: inherit;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  @media (prefers-color-scheme: dark) {
    .post-comments__form input,
    .post-comments__form textarea { background: rgba(0, 0, 0, 0.2); }
  }
  .post-comments__form input:focus,
  .post-comments__form textarea:focus {
    outline: none;
    border-color: #2a7ae2;
    box-shadow: 0 0 0 3px rgba(42, 122, 226, 0.15);
  }
  .post-comments__form input.is-invalid,
  .post-comments__form textarea.is-invalid {
    border-color: #c0392b;
    box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.12);
  }
  .post-comments__form textarea {
    resize: vertical;
    min-height: 4.5em;
    transition: min-height 0.15s ease;
  }
  .post-comments__form.is-collapsed textarea {
    min-height: 0;
    resize: none;
  }
  .post-comments__expanded {
    display: flex;
    flex-direction: column;
    gap: 0.65em;
    overflow: hidden;
    max-height: 20em;
    transition: max-height 0.2s ease, opacity 0.2s ease, margin-top 0.2s ease;
  }
  .post-comments__form.is-collapsed .post-comments__expanded {
    max-height: 0;
    opacity: 0;
    margin-top: -0.65em; /* cancel parent gap when hidden */
    pointer-events: none;
  }
  .post-comments__form.is-collapsed .post-comments__field-meta { display: none; }
  .post-comments__cancel {
    background: none !important;
    color: #888 !important;
    font-weight: 500 !important;
    margin-right: auto;
  }
  .post-comments__cancel:hover { color: inherit !important; }
  .post-comments__actions { gap: 0.5em; align-items: center; }

  .post-comments__field-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8em;
    min-height: 1.1em;
  }
  .post-comments__error { color: #c0392b; }
  .post-comments__counter { color: #999; margin-left: auto; }
  .post-comments__counter.is-near { color: #d68a00; }
  .post-comments__counter.is-over { color: #c0392b; }

  .post-comments__actions { display: flex; justify-content: flex-end; }
  .post-comments__form button {
    border: none;
    border-radius: 999px;
    padding: 0.5em 1.25em;
    background: #2a7ae2;
    color: #fff;
    cursor: pointer;
    font: inherit;
    font-weight: 600;
    transition: background 0.15s ease, transform 0.05s ease;
  }
  .post-comments__form button:hover:not(:disabled) { background: #1f63bd; }
  .post-comments__form button:active:not(:disabled) { transform: translateY(1px); }
  .post-comments__form button:disabled { opacity: 0.55; cursor: default; }
</style>

<script>
(function () {
  var root = document.getElementById('post-comments');
  if (!root) return;
  var api = root.dataset.api;
  var section = root.dataset.section;
  var id = root.dataset.id;
  if (!api) return;

  var base = api + '/comments/' + section + '/' + id;

  var pageContent = document.querySelector('.page__content');
  if (pageContent) pageContent.appendChild(root);

  var titleEl = root.querySelector('[data-comments-title]');
  var listEl = root.querySelector('[data-comments-list]');
  var form = root.querySelector('[data-comments-form]');
  var errorEl = root.querySelector('[data-comments-error]');
  var counterEl = root.querySelector('[data-comments-counter]');
  var nameInput = form.querySelector('input[name="name"]');
  var textInput = form.querySelector('textarea[name="text"]');
  var submitBtn = form.querySelector('button[type="submit"]');
  var cancelBtn = form.querySelector('[data-comments-cancel]');
  var TEXT_MAX = 1000;

  function expand() { form.classList.remove('is-collapsed'); }
  textInput.addEventListener('focus', expand);
  cancelBtn.addEventListener('click', function () {
    textInput.value = '';
    updateCounter();
    clearInvalid();
    form.classList.add('is-collapsed');
    textInput.blur();
  });

  var SECRETS_KEY = 'commentSecrets:' + section + ':' + id;
  function loadSecrets() {
    try { return JSON.parse(localStorage.getItem(SECRETS_KEY) || '{}') || {}; }
    catch { return {}; }
  }
  function saveSecrets(map) { localStorage.setItem(SECRETS_KEY, JSON.stringify(map)); }
  function rememberSecret(commentId, secret) {
    var m = loadSecrets(); m[commentId] = secret; saveSecrets(m);
  }
  function forgetSecret(commentId) {
    var m = loadSecrets(); delete m[commentId]; saveSecrets(m);
  }
  function secretFor(commentId) { return loadSecrets()[commentId] || ''; }

  function savedName() { return localStorage.getItem('commentName') || ''; }
  if (savedName()) nameInput.value = savedName();

  function localDate() {
    var d = new Date();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + m + '-' + day;
  }

  // hash a name to a stable hue (0..359), then build an HSL color.
  function avatarColor(name) {
    var h = 0;
    for (var i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return 'hsl(' + (h % 360) + ', 55%, 50%)';
  }
  function initialOf(name) {
    var trimmed = (name || '').trim();
    return trimmed ? trimmed.charAt(0).toUpperCase() : '?';
  }

  // Pluralize: pluralize(2, 'day') -> '2 days'
  function pluralize(n, word) { return n + ' ' + word + (n === 1 ? '' : 's'); }

  // Format a YYYY-MM-DD date into a relative phrase.
  function relativeDate(ymd) {
    var parts = String(ymd).split('-');
    if (parts.length !== 3) return ymd;
    var then = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    if (isNaN(then.getTime())) return ymd;
    var now = new Date();
    var thenMid = new Date(then.getFullYear(), then.getMonth(), then.getDate());
    var nowMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var dayMs = 86400000;
    var diffDays = Math.floor((nowMid - thenMid) / dayMs);

    if (diffDays <= 0) return 'today';
    if (diffDays < 30) return pluralize(diffDays, 'day') + ' ago';

    var months = (nowMid.getFullYear() - thenMid.getFullYear()) * 12
      + (nowMid.getMonth() - thenMid.getMonth());
    if (nowMid.getDate() < thenMid.getDate()) months -= 1;

    if (months < 12) return pluralize(months, 'month') + ' ago';

    var years = Math.floor(months / 12);
    var remMonths = months - years * 12;
    if (remMonths === 0) return pluralize(years, 'year') + ' ago';
    return pluralize(years, 'year') + ' ' + pluralize(remMonths, 'month') + ' ago';
  }

  function setTitle(count) {
    titleEl.textContent = '';
    titleEl.classList.toggle('is-empty', count === 0);

    var icon = document.createElement('i');
    icon.setAttribute('aria-hidden', 'true');
    icon.className = count === 0 ? 'far fa-comment-dots' : 'fas fa-comments';
    titleEl.appendChild(icon);

    if (count === 0) {
      titleEl.appendChild(document.createTextNode('No comments yet.'));
      return;
    }
    titleEl.appendChild(document.createTextNode('Comments'));
    if (typeof count === 'number') {
      var span = document.createElement('span');
      span.className = 'post-comments__title-count';
      span.textContent = '(' + count + ')';
      titleEl.appendChild(span);
    }
  }

  function updateCounter() {
    var len = textInput.value.length;
    counterEl.textContent = len + ' / ' + TEXT_MAX;
    counterEl.classList.toggle('is-near', len >= TEXT_MAX * 0.9 && len < TEXT_MAX);
    counterEl.classList.toggle('is-over', len >= TEXT_MAX);
  }
  textInput.addEventListener('input', updateCounter);
  updateCounter();

  function clearInvalid() {
    nameInput.classList.remove('is-invalid');
    textInput.classList.remove('is-invalid');
    errorEl.textContent = '';
  }
  nameInput.addEventListener('input', clearInvalid);
  textInput.addEventListener('input', clearInvalid);

  function render(list) {
    listEl.textContent = '';
    setTitle(list.length);

    if (!list.length) return;

    list.forEach(function (c) {
      var item = document.createElement('div');
      item.className = 'post-comments__item';

      var avatar = document.createElement('div');
      avatar.className = 'post-comments__avatar';
      avatar.style.background = avatarColor(c.name || '?');
      avatar.textContent = initialOf(c.name);
      avatar.setAttribute('aria-hidden', 'true');
      item.appendChild(avatar);

      var body = document.createElement('div');
      body.className = 'post-comments__body';

      var meta = document.createElement('div');
      meta.className = 'post-comments__meta';
      var nameSpan = document.createElement('span');
      nameSpan.className = 'post-comments__name';
      nameSpan.style.color = avatarColor(c.name || '?');
      nameSpan.textContent = c.name;
      var sepSpan = document.createElement('span');
      sepSpan.className = 'post-comments__sep';
      sepSpan.textContent = '•';
      sepSpan.setAttribute('aria-hidden', 'true');
      var dateSpan = document.createElement('span');
      dateSpan.className = 'post-comments__date';
      dateSpan.textContent = relativeDate(c.date);
      dateSpan.title = c.date;
      meta.appendChild(nameSpan);
      meta.appendChild(sepSpan);
      meta.appendChild(dateSpan);

      if (secretFor(c.id)) {
        var actions = document.createElement('span');
        actions.className = 'post-comments__owner';
        if (c.date === localDate()) {
          var editBtn = document.createElement('button');
          editBtn.type = 'button';
          editBtn.title = 'Edit';
          editBtn.setAttribute('aria-label', 'Edit comment');
          editBtn.innerHTML = '<i class="fas fa-pen" aria-hidden="true"></i>';
          editBtn.addEventListener('click', function () { onEdit(c); });
          actions.appendChild(editBtn);
        }
        var delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.title = 'Delete';
        delBtn.setAttribute('aria-label', 'Delete comment');
        delBtn.innerHTML = '<i class="fas fa-trash" aria-hidden="true"></i>';
        delBtn.addEventListener('click', function () { onDelete(c); });
        actions.appendChild(delBtn);
        meta.appendChild(actions);
      }

      var text = document.createElement('div');
      text.className = 'post-comments__text';
      text.textContent = c.text;

      body.appendChild(meta);
      body.appendChild(text);
      item.appendChild(body);
      listEl.appendChild(item);
    });
  }

  function load() {
    fetch(base)
      .then(function (r) { return r.ok ? r.json() : []; })
      .then(render)
      .catch(function () {
        listEl.textContent = '';
        var p = document.createElement('p');
        p.className = 'post-comments__empty';
        p.textContent = 'Could not load comments.';
        listEl.appendChild(p);
      });
  }

  function onSubmit(e) {
    e.preventDefault();
    clearInvalid();
    var name = nameInput.value.trim();
    var text = textInput.value.trim();
    var bad = false;
    if (!name) { nameInput.classList.add('is-invalid'); bad = true; }
    if (!text) { textInput.classList.add('is-invalid'); bad = true; }
    if (bad) { errorEl.textContent = 'Name and comment are required.'; return; }

    submitBtn.disabled = true;
    fetch(base, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: localDate(), name: name, text: text }),
    })
      .then(function (r) {
        if (r.status === 429) throw new Error('Too many comments — try again later.');
        if (!r.ok) throw new Error('Failed to post comment.');
        return r.json();
      })
      .then(function (resp) {
        if (resp && resp.comment && resp.comment.id && resp.comment.secret) {
          rememberSecret(resp.comment.id, resp.comment.secret);
        }
        textInput.value = '';
        updateCounter();
        localStorage.setItem('commentName', name);
        form.classList.add('is-collapsed');
        render((resp && resp.comments) || []);
      })
      .catch(function (err) { errorEl.textContent = err.message || 'Error.'; })
      .then(function () { submitBtn.disabled = false; });
  }

  function onEdit(c) {
    var secret = secretFor(c.id);
    if (!secret) return;
    var next = window.prompt('Edit comment:', c.text);
    if (next == null) return;
    next = next.trim();
    if (!next) return;
    fetch(base + '/' + c.id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Comment-Secret': secret },
      body: JSON.stringify({ text: next, date: localDate() }),
    })
      .then(function (r) {
        if (r.status === 403) throw new Error('Edits are only allowed on the day the comment was posted.');
        if (!r.ok) throw new Error('Edit failed.');
        return r.json();
      })
      .then(render)
      .catch(function (err) { errorEl.textContent = err.message || 'Edit failed.'; });
  }

  function onDelete(c) {
    var secret = secretFor(c.id);
    if (!secret) return;
    if (!window.confirm('Delete this comment?')) return;
    fetch(base + '/' + c.id, {
      method: 'DELETE',
      headers: { 'X-Comment-Secret': secret },
    })
      .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function (list) {
        forgetSecret(c.id);
        render(list);
      })
      .catch(function () { errorEl.textContent = 'Delete failed.'; });
  }

  form.addEventListener('submit', onSubmit);
  load();
})();
</script>
